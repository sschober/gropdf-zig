name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Formatting ─────────────────────────────────────────────────────────────
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v1
        with:
          version: "0.14.1"

      - name: zig fmt --check
        run: zig fmt --check src/ build.zig

  # ── Build & Test ───────────────────────────────────────────────────────────
  test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v1
        with:
          version: "0.14.1"

      - name: zig build
        run: zig build

      - name: zig build test
        run: zig build test --summary all
