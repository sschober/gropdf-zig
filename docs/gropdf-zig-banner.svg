<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="60%" style="stop-color:#111820"/>
      <stop offset="100%" style="stop-color:#0a0e14"/>
    </linearGradient>
    <linearGradient id="zigGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7a41d"/>
      <stop offset="100%" style="stop-color:#f0891a"/>
    </linearGradient>
    <linearGradient id="pdfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8"/>
      <stop offset="100%" style="stop-color:#c0c0c0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e2736; stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#1e2736; stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1e2736; stop-opacity:0"/>
    </linearGradient>
    <filter id="zigGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="160" fill="url(#bgGrad)"/>

  <!-- Horizontal typesetting lines across full width -->
  <g stroke="#1a2030" stroke-width="0.75" opacity="0.8">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
  </g>

  <!-- Decorative column strip (background) -->
  <rect x="200" y="0" width="500" height="160" fill="url(#fadeRight)" opacity="0.5"/>

  <!-- Document icon (smaller, left-aligned) -->
  <g transform="translate(22, 20)">
    <rect x="0" y="6" width="60" height="78" rx="4" fill="#1e2736" stroke="#30404d" stroke-width="1.2"/>
    <path d="M44 6 L60 22 L44 22 Z" fill="#0d1117" stroke="#30404d" stroke-width="1"/>
    <rect x="7" y="30" width="32" height="2.5" rx="1.25" fill="#3a5068" opacity="0.8"/>
    <rect x="7" y="37" width="40" height="2.5" rx="1.25" fill="#3a5068" opacity="0.8"/>
    <rect x="7" y="44" width="28" height="2.5" rx="1.25" fill="#3a5068" opacity="0.7"/>
    <rect x="7" y="51" width="38" height="2.5" rx="1.25" fill="#3a5068" opacity="0.7"/>
    <rect x="7" y="58" width="24" height="2.5" rx="1.25" fill="#3a5068" opacity="0.5"/>
    <rect x="7" y="65" width="36" height="2.5" rx="1.25" fill="#3a5068" opacity="0.5"/>
    <!-- Zig bolt -->
    <path d="M10 13 L36 13 L22 24 L44 24 L18 42 L32 42"
          stroke="url(#zigGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"
          fill="none" filter="url(#zigGlow)"/>
  </g>

  <!-- Main wordmark — horizontal, compact -->
  <text x="100" y="75"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="56"
        font-weight="700"
        letter-spacing="-1.5"
        fill="url(#pdfGrad)"
        filter="url(#textGlow)">gropdf</text>

  <text x="370" y="75"
        font-family="'Courier New', monospace"
        font-size="52"
        font-weight="700"
        letter-spacing="1"
        fill="url(#zigGrad)"
        filter="url(#zigGlow)">-zig</text>

  <!-- Divider line -->
  <line x1="100" y1="90" x2="530" y2="90" stroke="#2a3848" stroke-width="1"/>

  <!-- Tagline -->
  <text x="100" y="115"
        font-family="'Courier New', monospace"
        font-size="13"
        fill="#4a6a88"
        letter-spacing="3">PDF OUTPUT DEVICE FOR THE GROFF TYPESETTING SYSTEM</text>

  <!-- Right side: subtle code snippet decoration -->
  <g opacity="0.18" font-family="'Courier New', monospace" font-size="11" fill="#f7a41d">
    <text x="610" y="42">const pdf = PdfWriter.init(alloc);</text>
    <text x="610" y="58">try pdf.embedFont(font_path);</text>
    <text x="610" y="74">try pdf.writeGlyph(glyph_id);</text>
    <text x="610" y="90">try pdf.finalize(output);</text>
    <text x="610" y="106">// groff → PDF pipeline</text>
  </g>

  <!-- Top + bottom amber accent bars -->
  <rect x="0" y="0" width="900" height="2.5" rx="0" fill="url(#zigGrad)" opacity="0.6"/>
  <rect x="0" y="157.5" width="900" height="2.5" rx="0" fill="url(#zigGrad)" opacity="0.3"/>
</svg>
